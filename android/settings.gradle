pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-gradle-plugin" apply false
    id "com.android.application" version "8.9.1" apply false
    // START: FlutterFire Configuration
    id "com.google.gms.google-services" version "4.3.15" apply false
    // END: FlutterFire Configuration
    id "org.jetbrains.kotlin.android" version "2.1.0" apply false
}

// Include Flutter plugin projects from .flutter-plugins-dependencies
def flutterProjectRoot = rootProject.projectDir.parentFile.toPath()

def pluginsFile = new File(flutterProjectRoot.toFile(), '.flutter-plugins-dependencies')
if (pluginsFile.exists()) {
    def pluginsJson = new groovy.json.JsonSlurper().parseText(pluginsFile.text)
    def androidPlugins = pluginsJson?.plugins?.android ?: []

    androidPlugins.each { plugin ->
        def pluginName = plugin.name
        def pluginPath = plugin.path
        def nativeBuild = plugin.native_build

        if (nativeBuild == null || nativeBuild) {
            def pluginAndroidDir = new File(pluginPath, 'android')
            if (pluginAndroidDir.exists()) {
                include ":${pluginName}"
                project(":${pluginName}").projectDir = pluginAndroidDir
            }
        }
    }
}

include ":app"
